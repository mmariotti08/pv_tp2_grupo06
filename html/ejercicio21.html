<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 21 - Países y Capitales</title>
    
    <link rel="stylesheet" href="../assets/css/ejercicio21.css">
</head>
<body>

    <h2>Selecciona un País y su Capital</h2>

    <label for="selectPaises">País:</label>
    <select id="selectPaises">
        <option value="">Seleccione un país...</option>
        <option value="argentina">Argentina</option>
        <option value="brasil">Brasil</option>
        <option value="chile">Chile</option>
        <option value="uruguay">Uruguay</option>
        <option value="paraguay">Paraguay</option>
        <option value="bolivia">Bolivia</option>
    </select>

    <br><br>

    <label for="selectCapitales">Capital:</label>
    <select id="selectCapitales" >
        <option value="">Capital...</option>
        <option value="buenos-aires">Buenos Aires</option>
        <option value="brasilia">Brasilia</option>
        <option value="santiago">Santiago</option>
        <option value="montevideo">Montevideo</option>
        <option value="asuncion">Asunción</option>
        <option value="la-paz">La Paz</option>
    </select>

    <script src="../JS/ejercicio21.js"></script>
</body>
</html>
