<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 25</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.4s ease;
        }

        .contenedor {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        h2 {
            color: #1e3a8a;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h2>Cambiar color de fondo</h2>
        <button id="btnCambiarColor">Cambiar color</button>
    </div>

    <script type="module" src="../JS/ejercicio25.js"></script>
</body>
</html>
