<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 15</title>
</head>    
<body>
    <script>
        //Funcion para retornar el mes
        const retornarMes = (num) => {
            let meses = [
                "Enero" , "Febrero", "Marzo", "Abril",
                "Mayo", "Junio", "Julio", "Agosto",
                "Septiembre", "Octubre", "Noviembre", "Diciembre"
            ];
            
            if(num>=1 && num <=12) {
                return meses [num -1];
            } else{
                return "No es un mes valido";
            }
};

//Pedir numero al usuario
let numero = parseInt(prompt("Ingrese un número del 1 al 12:"));

//Obtener Resultado
let resultado = retornarMes(numero);

//Mostrar Resultado
document.write(`Resultado: ${resultado}`);

    </script>
</body>
<html>
